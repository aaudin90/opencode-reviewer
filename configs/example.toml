# OpenCode Reviewer configuration example.
# Copy to dev.toml and adjust for your project:
#   cp configs/example.toml configs/dev.toml
#
# Prefer --config-dir/OR_CONFIG_DIR for project-local files, or pass this TOML explicitly with --config.
# Provider and prompt environment variables are deprecated fallbacks when config-dir is inactive.
#
# Environment variables (override TOML values):
#   OR_CONFIG_DIR               Path to config directory
#   OR_DISABLE_CONFIG_DIR_AUTO_DISCOVERY  Disable .opencodereview auto-discovery (true/1)
#   OR_PROJECT_DIR               Path to the project repository
#   OR_BRANCH                    Branch to review (overridden by --branch flag)
#   OR_GIT_REMOTE                Git remote name
#   OR_GIT_BASE_BRANCH           Base branch for diff
#   OR_OPENCODE_ENDPOINT         opencode API endpoint URL
#   OR_OPENCODE_PORT             opencode port
#   OR_OPENCODE_MODEL            LLM model identifier
#   OR_OPENCODE_BINARY           Path to opencode binary
#   OR_OPENCODE_STAGE_TIMEOUT    Timeout per stage in seconds
#   OR_OPENCODE_MAX_STEPS        Max agent steps per session
#   OR_OPENCODE_MIN_VERSION      Minimum opencode version
#   OR_OPENCODE_PRINT_LOGS       Pass --print-logs to opencode serve
#   OR_OPENCODE_LOG_LEVEL        Pass --log-level to opencode serve (DEBUG, INFO, WARN, ERROR)
#   OR_OPENCODE_LOG_DIR          OpenCode log directory
#   OR_OPENCODE_KEEP_XDG_DIRS    Keep temporary OpenCode XDG dirs after run for debugging
#   OR_PROVIDER_CONFIG_PATH      Deprecated fallback: path to provider JSON file
#   OR_PROVIDER_CONFIG           Deprecated fallback: inline provider JSON config
#   OR_AGENT_PROMPT_PATH         Deprecated fallback: path to reviewer agent prompt file
#   OR_MESSAGE_PATHS             Deprecated fallback: comma-separated paths to reviewer message files
#   OR_FINALIZER_PROMPT_PATH     Deprecated fallback: path to finalizer agent prompt file
#   OR_FINALIZER_MESSAGE_PATH    Deprecated fallback: path to finalizer user message file
#   OR_REVIEW_SUB_AGENT_PROMPT_PATHS     Deprecated fallback: comma-separated paths to reviewer sub-agent prompt files
#   OR_FINALIZER_SUB_AGENT_PROMPT_PATHS  Deprecated fallback: comma-separated paths to finalizer sub-agent prompt files
#   OR_GITLAB_URL                GitLab instance URL
#   OR_GITLAB_TOKEN              GitLab private access token
#   OR_GITLAB_PROJECT_ID         Numeric GitLab project ID
#   OR_GITLAB_CLEAR_COMMENTS     Clear open MR discussions before posting (true/1)
#
# Priority (config directory):  --config-dir flag > OR_CONFIG_DIR env > <project_dir or cwd>/.opencodereview.
# Priority (branch):            --branch flag > OR_BRANCH env > git.branch TOML.
# Priority (provider):          config-dir provider.json > TOML path > deprecated OR_PROVIDER_CONFIG_PATH/OR_PROVIDER_CONFIG fallback.
# Priority (agent prompt):      config-dir reviewer/agent.md > review_agent_prompt TOML > review_agent_prompt_path TOML > deprecated OR_AGENT_PROMPT_PATH fallback > built-in default.
# Priority (messages):          config-dir reviewer/messages/*.md > review_messages TOML > review_message_paths TOML > deprecated OR_MESSAGE_PATHS fallback > (none).
# Priority (finalizer prompt):  config-dir finalizer/agent.md > finalizer_prompt TOML > finalizer_prompt_path TOML > deprecated OR_FINALIZER_PROMPT_PATH fallback > built-in default.
# Priority (finalizer message): config-dir finalizer/message.md > finalizer_message TOML > finalizer_message_path TOML > deprecated OR_FINALIZER_MESSAGE_PATH fallback > built-in default.
# Priority (reviewer sub-agents):  config-dir reviewer/sub-agents/*.md > review_sub_agent_prompts TOML > review_sub_agent_prompt_paths TOML > deprecated OR_REVIEW_SUB_AGENT_PROMPT_PATHS fallback > (none).
# Priority (finalizer sub-agents): config-dir finalizer/sub-agents/*.md > finalizer_sub_agent_prompts TOML > finalizer_sub_agent_prompt_paths TOML > deprecated OR_FINALIZER_SUB_AGENT_PROMPT_PATHS fallback > (none).

# project_dir: absolute path to the project repository to review.
# Used as working directory for git, opencode serve, and output.
project_dir = "/path/to/your/project"

# [env]: environment variables applied after TOML fields but before system env takes effect.
# Values override TOML config fields but do not override variables already set in the system environment.
# Priority: system env > [env] > TOML fields.
# Useful for API keys referenced by {env:...} placeholders in provider.json.
[env]
  LLM_PROXY_API_KEY = ""

[opencode]
  # endpoint: URL of a running opencode serve instance.
  # If set, the reviewer connects to it instead of starting a subprocess.
  # endpoint = "http://localhost:4096"

  # port: port for the opencode subprocess (used when endpoint is empty).
  # Default: 4096.
  port = 4096

  # model: LLM model identifier.
  # Prefer setting it in provider.json; use this only for an explicit TOML override.
  # model = "llm-proxy/kimi-k2.5"

  # binary: path to the opencode CLI binary.
  # Default: "opencode" (resolved via PATH).
  binary = "opencode"

  # stage_timeout: maximum seconds for a single review stage.
  # Default: 600.
  stage_timeout = 600

  # max_steps: maximum agent steps per review session.
  # Default: 50.
  max_steps = 50

  # print_logs: pass --print-logs to opencode serve.
  # Env: OR_OPENCODE_PRINT_LOGS
  print_logs = false

  # log_level: pass --log-level to opencode serve when set.
  # Valid values: DEBUG, INFO, WARN, ERROR.
  # Env: OR_OPENCODE_LOG_LEVEL
  # log_level = "DEBUG"

  # log_dir: directory for OpenCode stdout/stderr log files when print_logs is true.
  # Relative paths are resolved under project_dir. Default: opencode-review-logs.
  # Env: OR_OPENCODE_LOG_DIR
  log_dir = "opencode-review-logs"

  # provider_config_path: path to provider JSON config (relative to this file or absolute).
  # Deprecated env fallback when config-dir is inactive: OR_PROVIDER_CONFIG_PATH.
  provider_config_path = "provider.json"

[git]
  # remote: git remote name. Default: "origin".
  remote = "origin"

  # branch: branch to review.
  # Can also be set via --branch flag or OR_BRANCH env var.
  branch = ""

  # base_branch: branch to compare against. Default: "main".
  base_branch = "main"

[pipeline]
  # review_agent_prompt_path: path to the reviewer agent prompt file (relative to this file or absolute).
  # Deprecated env fallback when config-dir is inactive: OR_AGENT_PROMPT_PATH.
  review_agent_prompt_path = "agent-prompt.md"

  # review_agent_prompt: inline reviewer agent prompt (alternative to path).
  # If set, review_agent_prompt_path is ignored.
  # review_agent_prompt = "You are a code reviewer..."

  # review_message_paths: list of reviewer message files (relative to this file or absolute).
  # Each file triggers a separate parallel review session.
  # Deprecated env fallback when config-dir is inactive: OR_MESSAGE_PATHS (comma-separated paths).
  review_message_paths = [
    "../prompt-examples/review-bugs.md",
    "../prompt-examples/review-security.md",
    "../prompt-examples/review-architecture.md",
    "../prompt-examples/review-style.md",
  ]

  # review_messages: inline reviewer messages (alternative to review_message_paths).
  # If set, review_message_paths is ignored.
  # review_messages = ["Review for bugs...", "Review for security..."]

  # finalizer_prompt_path: path to the finalizer agent prompt file (relative to this file or absolute).
  # Deprecated env fallback when config-dir is inactive: OR_FINALIZER_PROMPT_PATH.
  # finalizer_prompt_path = "finalizer.md"

  # finalizer_prompt: inline finalizer agent prompt (alternative to path).
  # If set, finalizer_prompt_path is ignored.
  # finalizer_prompt = "You are a finalizer..."

  # finalizer_message_path: path to the finalizer user message file (relative to this file or absolute).
  # Deprecated env fallback when config-dir is inactive: OR_FINALIZER_MESSAGE_PATH.
  # If not set, the built-in default message is used.
  # finalizer_message_path = "finalizer-message.md"

  # finalizer_message: inline finalizer user message (alternative to path).
  # If set, finalizer_message_path is ignored.
  # finalizer_message = "Merge and deduplicate the following findings..."

  # review_sub_agent_prompt_paths: paths to reviewer sub-agent prompt files (relative to this file or absolute).
  # Sub-agents run in "subagent" mode and cannot call submit_review or submit_final_review.
  # Deprecated env fallback when config-dir is inactive: OR_REVIEW_SUB_AGENT_PROMPT_PATHS.
  # review_sub_agent_prompt_paths = [
  #   "../prompt-examples/sub-agents/reviewer-verifier.md",
  # ]

  # review_sub_agent_prompts: inline reviewer sub-agent prompts (alternative to paths).
  # If set, review_sub_agent_prompt_paths is ignored.
  # review_sub_agent_prompts = ["You are a verification sub-agent..."]

  # finalizer_sub_agent_prompt_paths: paths to finalizer sub-agent prompt files (relative to this file or absolute).
  # Sub-agents run in "subagent" mode and cannot call submit_review or submit_final_review.
  # Deprecated env fallback when config-dir is inactive: OR_FINALIZER_SUB_AGENT_PROMPT_PATHS.
  # finalizer_sub_agent_prompt_paths = [
  #   "../prompt-examples/sub-agents/finalizer-verifier.md",
  # ]

  # finalizer_sub_agent_prompts: inline finalizer sub-agent prompts (alternative to paths).
  # If set, finalizer_sub_agent_prompt_paths is ignored.
  # finalizer_sub_agent_prompts = ["You are a verification sub-agent..."]

# [gitlab]
#   # url: GitLab instance URL.
#   # Env: OR_GITLAB_URL
#   url = "https://gitlab.example.com"
#
#   # token: GitLab private access token.
#   # Env: OR_GITLAB_TOKEN
#   token = ""
#
#   # project_id: numeric GitLab project ID.
#   # Env: OR_GITLAB_PROJECT_ID
#   project_id = 0
#
#   # clear_comments: delete open unanswered discussions before posting.
#   # Env: OR_GITLAB_CLEAR_COMMENTS
#   # clear_comments = false
